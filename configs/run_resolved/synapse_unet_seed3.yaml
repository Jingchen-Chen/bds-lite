project:
  name: bds-lite
  output_dir: results
  seed: 3
data:
  processed_root: data/processed
  num_workers: 4
  image_size:
  - 224
  - 224
  normalize: zscore
model:
  name: unet
  base_channels: 32
  use_boundary_decoder: false
  use_boundary_gate: false
  use_surface_loss: false
  use_distillation: false
  inference_disable_boundary_decoder: true
loss:
  dice_weight: 1.0
  ce_weight: 1.0
  boundary_weight: 0.0
  distill_weight: 0.0
  surface_weight: 0.0
  distance_weight: 0.0
  foreground_class_weights: null
trainer:
  device: cuda
  epochs: 150
  batch_size: 16
  lr: 0.0001
  weight_decay: 1.0e-05
  amp: true
  save_every: 25
  scheduler: cosine
  grad_clip: 1.0
  init_from_checkpoint: null
  freeze_encoder_epochs: 0
metrics:
- dsc
- iou
- hd95
- assd
- boundary_f1
