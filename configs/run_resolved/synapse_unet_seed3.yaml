  - gallbladder
  - spleen
  - left_kidney
  - right_kidney
  - liver
  - stomach
  - pancreas
  input_size:
  - 224
  - 224
  spacing_policy: use_sample_spacing_if_available_else_unit
  ignore_index: null
  train_split: train
  val_split: val
  test_split: test
  metrics:
    primary: dsc
