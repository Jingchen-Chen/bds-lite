project:
  name: bds-lite
  output_dir: results
  seed: 3
data:
  processed_root: data/processed
  num_workers: 4
  image_size:
  - 224
  - 224
  normalize: zscore
model:
  name: unet
  base_channels: 32
  use_boundary_decoder: false
  use_boundary_gate: false
  use_surface_loss: false
  use_distillation: false
  inference_disable_boundary_decoder: true
loss:
  dice_weight: 1.0
  ce_weight: 1.0
  boundary_weight: 0.0
  distill_weight: 0.0
  surface_weight: 0.0
  distance_weight: 0.0
  foreground_class_weights: null
trainer:
  device: cuda
  epochs: 150
  batch_size: 16
  lr: 0.0001
  weight_decay: 1.0e-05
  amp: true
  save_every: 25
  scheduler: cosine
  grad_clip: 1.0
  init_from_checkpoint: null
  freeze_encoder_epochs: 0
metrics:
- dsc
- iou
- hd95
- assd
- boundary_f1
dataset:
  name: acdc
  modality: mri
  task: cardiac_segmentation
  num_classes: 4
  in_channels: 1
  processed_dir: data/processed/acdc
  image_dir: .
  mask_dir: .
  # >>> ADDED NOTE (not part of the original resolved snapshot) <<<
  # split_file is VESTIGIAL. The data loader (NpzSegmentationDataset) IGNORES this
  # field; it selects samples by globbing data/processed/<dataset>/<split>/*.npz.
  # The authoritative partition is the seed-2026 manifests in splits/<dataset>/
  # (ISIC 2075/519, ACDC 1350/186/366, Synapse 1738/473/1568); 0 train/val overlap
  # and matching case IDs were verified. The path named below is a STALE seed-1
  # split that is NOT shipped and was NEVER consumed -- a reviewer cannot reach a
  # leakage conclusion from it. See run_resolved/README.md and docs/config_of_record.md.
  split_file: splits/acdc_split.json
  class_names:
  - background
  - right_ventricle
  - myocardium
  - left_ventricle
  input_size:
  - 224
  - 224
  spacing_policy: use_sample_spacing_if_available_else_unit
  ignore_index: null
  train_split: train
  val_split: val
  test_split: test
  metrics:
    primary: dsc
    boundary: hd95
  root: data/processed/acdc
