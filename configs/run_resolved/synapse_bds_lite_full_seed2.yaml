project:
  name: bds-lite
  output_dir: results
  seed: 2
data:
  processed_root: data/processed
  num_workers: 4
  image_size:
  - 224
  - 224
  normalize: zscore
model:
  name: bds_lite
  base_channels: 32
  boundary_classes: 1
  boundary_gate: true
  boundary_gate_scale: 0.25
  use_boundary_decoder: true
  use_boundary_gate: true
  use_surface_loss: true
  use_distillation: true
  inference_disable_boundary_decoder: true
  disable_boundary_at_inference: true
loss:
  dice_weight: 1.0
  ce_weight: 1.0
  boundary_weight: 0.05
  distill_weight: 0.05
  surface_weight: 1.0
  distance_weight: 0.0
  foreground_class_weights: null
  class_weights: null
trainer:
  device: cuda
  epochs: 150
  batch_size: 16
  lr: 0.0001
  weight_decay: 1.0e-05
  amp: true
  save_every: 25
  scheduler: cosine
  grad_clip: 1.0
  init_from_checkpoint: null
  freeze_encoder_epochs: 0
metrics:
- dsc
- iou
- hd95
- assd
- boundary_f1
dataset:
  name: synapse
  modality: ct
  task: abdominal_multi_organ
  num_classes: 9
  in_channels: 1
  processed_dir: data/processed/synapse
  image_dir: .
  mask_dir: .
  split_file: splits/synapse_split.json
  class_names:
  - background
  - aorta
  - gallbladder
  - spleen
  - left_kidney
  - right_kidney
  - liver
  - stomach
  - pancreas
  input_size:
  - 224
  - 224
  spacing_policy: use_sample_spacing_if_available_else_unit
  ignore_index: null
  train_split: train
  val_split: val
  test_split: test
  metrics:
    primary: dsc
    boundary: hd95
  root: data/processed/synapse
